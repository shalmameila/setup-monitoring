global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'mac-host'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'ubuntu-orbstack'
    static_configs:
      # Ganti 'ubuntuonmac' dengan nama mesin lo di OrbStack kalau beda
      - targets: ['ubuntuonmac.orb.local:9100']
